<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>
      Royal Fort Housing Scheme Sahiwal | Premium Residential & Commercial Plots
    </title>
    <meta
      name="description"
      content="Royal Fort Housing Scheme Sahiwal offers TMA-approved luxury residential and commercial plots in 4, 5, 6, 7, 10, and 20 Marla. Book your plot today."
    />
    <meta name="author" content="Royal Fort Housing Scheme" />
    <meta
      name="keywords"
      content="Royal Fort Housing Scheme, Sahiwal, residential plots, commercial plots, luxury housing, TMA-approved, 4 Marla, 5 Marla, 10 Marla"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://royalfort.site/" />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="Royal Fort Housing Scheme Sahiwal | Premium Residential & Commercial Plots"
    />
    <meta
      property="og:description"
      content="Explore Royal Fort Housing Scheme Sahiwal — TMA-approved society with modern infrastructure, parks, and luxury residential & commercial plots. Book now!"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://royalfort.site/" />
    <meta property="og:image" content="https://royalfort.site/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@RoyalFortSahiwal" />
    <meta
      name="twitter:title"
      content="Royal Fort Housing Scheme Sahiwal | Premium Residential & Commercial Plots"
    />
    <meta
      name="twitter:description"
      content="TMA-approved luxury housing society in Sahiwal. Residential & commercial plots available in 4, 5, 6, 7, 10, and 20 Marla."
    />
    <meta name="twitter:image" content="https://royalfort.site/logo.png" />

    <!-- Favicon -->
    <link rel="icon" href="logo.png" type="image/x-icon" />

    <!-- Structured Data (JSON-LD for Website) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Royal Fort Housing Scheme Sahiwal",
        "url": "https://royalfort.site/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://royalfort.site/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data (JSON-LD for Organization) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Royal Fort Housing Scheme Sahiwal",
        "url": "https://royalfort.site/",
        "logo": "https://royalfort.site/assets/logo.png",
        "sameAs": [
          "https://www.facebook.com/royalforthousingscheme",
          "https://www.instagram.com/royalfortsahiwal"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
